# ============================================================
# Nginx — Motor Antifraude Aseguradora del Sur
# Dominio: index.datacoreecuadorcompetition.online
#
# NOTA: Cloudflare Tunnel maneja el HTTPS externo.
# Nginx solo necesita escuchar en :80 internamente.
# NO se necesita SSL aquí — Cloudflare termina el TLS.
# ============================================================

server {
    listen 80;
    server_name index.datacoreecuadorcompetition.online
                webhooks.datacoreecuadorcompetition.online
                panel.datacoreecuadorcompetition.online
                localhost;

    # ── Logs ──────────────────────────────────────────────────
    access_log /var/log/nginx/antifraude_access.log;
    error_log  /var/log/nginx/antifraude_error.log;

    # ── Gzip ──────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;

    # ── CORS Global (Cloudflare ya maneja headers externos) ───
    add_header Access-Control-Allow-Origin  "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;

    # ── Preflight OPTIONS ─────────────────────────────────────
    if ($request_method = OPTIONS) {
        return 204;
    }

    # ── Tamaño máximo de upload (fotos + PDF de evidencias) ──
    client_max_body_size 100M;

    # ── Timeouts para análisis de IA (Gemini tarda hasta 60s) ─
    proxy_read_timeout    90s;
    proxy_connect_timeout 10s;
    proxy_send_timeout    90s;

    # ── Proxy Principal → FastAPI app en Docker ──────────────
    # La app sirve TANTO el frontend React SPA como el API
    location / {
        proxy_pass         http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Cache de archivos estáticos JSX/JS del frontend ──────
    location /static/ {
        proxy_pass       http://app:8000/static/;
        proxy_set_header Host $host;
        expires          7d;
        add_header       Cache-Control "public, immutable";
    }

    # ── Health check ──────────────────────────────────────────
    location /health {
        return 200 '{"status":"ok","service":"motor-antifraude","version":"2.0.0"}';
        add_header Content-Type application/json;
    }
}
